<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frozen Services</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; font-family:'Orbitron', sans-serif; }

body {
    background: radial-gradient(circle at top, #020617, #000);
    color:white;
    overflow-x:hidden;
    animation: fadeIn 1s ease;
}

/* Fade */
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

/* Animated Grid */
body::before {
    content:"";
    position:fixed;
    width:100%; height:100%;
    background: linear-gradient(#0ea5e9 1px, transparent 1px),
                linear-gradient(90deg, #0ea5e9 1px, transparent 1px);
    background-size: 50px 50px;
    opacity:0.08;
    animation: gridMove 15s linear infinite;
    z-index:-2;
}
@keyframes gridMove {
    from {background-position:0;}
    to {background-position:50px;}
}

/* Glow Orbs */
body::after {
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#0ea5e9;
    filter:blur(150px);
    top:-100px;
    left:-100px;
    opacity:0.2;
    animation: floatOrb 8s infinite alternate;
    z-index:-1;
}
@keyframes floatOrb {
    to {transform:translate(200px,200px);}
}

/* Header */
header {
    text-align:center;
    padding:25px;
    font-size:30px;
    color:#0ea5e9;
    text-shadow:0 0 25px #0ea5e9;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%{text-shadow:0 0 10px #0ea5e9;}
    50%{text-shadow:0 0 30px #0ea5e9;}
    100%{text-shadow:0 0 10px #0ea5e9;}
}

/* Nav */
nav {
    display:flex;
    justify-content:center;
    gap:30px;
}
nav a {
    color:white;
    text-decoration:none;
}
nav a:hover {
    color:#0ea5e9;
    text-shadow:0 0 10px #0ea5e9;
}

/* Hero */
.hero {
    text-align:center;
    padding:120px 20px;
}

.hero h1 {
    font-size:60px;
    color:#0ea5e9;
    position:relative;
}

/* Glitch */
.hero h1::before,
.hero h1::after {
    content:"CYBER SERVICES";
    position:absolute;
    left:0;
    width:100%;
}
.hero h1::before { color:red; animation: glitch 1s infinite; }
.hero h1::after { color:blue; animation: glitch 1s infinite reverse; }

@keyframes glitch {
    0%{transform:translate(0);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-2px,-2px);}
    100%{transform:translate(0);}
}

/* Services */
.services {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:50px;
}

/* Card */
.card {
    border:1px solid #0ea5e9;
    padding:25px;
    border-radius:12px;
    text-align:center;
    position:relative;
    overflow:hidden;
    transform:translateY(50px);
    opacity:0;
    transition:0.5s;
}

/* Reveal */
.card.show {
    transform:translateY(0);
    opacity:1;
}

/* Light Sweep */
.card::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(14,165,233,0.4), transparent);
    left:-100%;
}
.card:hover::before {
    left:100%;
    transition:0.6s;
}

.card:hover {
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px #0ea5e9;
}

/* Button */
.btn {
    display:inline-block;
    margin-top:15px;
    padding:10px 25px;
    border:1px solid #0ea5e9;
    color:#0ea5e9;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}
.btn:hover {
    background:#0ea5e9;
    color:black;
    box-shadow:0 0 20px #0ea5e9;
}

/* Popup */
.popup {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box {
    background:#020617;
    border:1px solid #0ea5e9;
    padding:30px;
    border-radius:12px;
    width:300px;
}

/* Inputs */
.popup-box input,
.popup-box textarea {
    width:100%;
    margin:10px 0;
    padding:10px;
    background:black;
    border:1px solid #0ea5e9;
    color:white;
}

.popup-box button {
    padding:10px;
    background:#0ea5e9;
    border:none;
}

/* Footer */
footer {
    text-align:center;
    padding:20px;
    opacity:0.5;
}
</style>
</head>

<body>

<header>FROZEN SERVICES</header>

<nav>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
<a href="login.html">Login</a>
</nav>

<section class="hero">
<h1>CYBER SERVICES</h1>
<p>Mods • Growth • Design</p>
</section>

<section id="services" class="services">

<div class="card">
<h3>SAMP Mods</h3>
<p>Top-quality mods</p>
<a href="#" class="btn" onclick="openOrder('SAMP Mods')">Buy</a>
</div>

<div class="card">
<h3>SAMP Custom Mods</h3>
<p>Custom-built mods</p>
<a href="#" class="btn" onclick="openOrder('SAMP Custom Mods')">Order</a>
</div>

<div class="card">
<h3>Instagram Followers</h3>
<p>Fast growth</p>
<a href="#" class="btn" onclick="openOrder('Instagram Followers')">Buy</a>
</div>

<div class="card">
<h3>Custom Logos</h3>
<p>Professional logos</p>
<a href="#" class="btn" onclick="openOrder('Custom Logos')">Order</a>
</div>

</section>

<section id="contact" style="text-align:center;padding:60px;">
<h2>Join Our Discord</h2>
<a href="https://discord.gg/3jbCR3zsS" class="btn">Join Now</a>
</section>

<!-- POPUP -->
<div id="orderPopup" class="popup">
<div class="popup-box">
<span onclick="closeOrder()" style="cursor:pointer;">X</span>

<input id="service" readonly>
<input id="name" placeholder="Discord Name">
<textarea id="details" placeholder="Details"></textarea>

<button onclick="submitOrder()">Submit</button>
</div>
</div>

<footer>© 2026 Frozen</footer>

<script>
// Scroll reveal
const cards = document.querySelectorAll('.card');
window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;
    cards.forEach(card => {
        if (card.getBoundingClientRect().top < trigger) {
            card.classList.add('show');
        }
    });
});

// Popup
function openOrder(s) {
    document.getElementById("orderPopup").style.display="flex";
    document.getElementById("service").value=s;
}
function closeOrder() {
    document.getElementById("orderPopup").style.display="none";
}

// Webhook
function submitOrder() {
    const webhookURL = "https://discord.com/api/webhooks/1498558945411858482/eHVp4I97DGnSeB0OGRdL7Et0jY0pu049frJ6sv6VEjacsxohjVYOlyhRR2adT_pvFPgM";

    fetch(webhookURL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:`🚀 New Order\nService: ${service.value}\nUser: ${name.value}\nDetails: ${details.value}`
        })
    });

    alert("Order Sent ✅");
    closeOrder();
}
</script>

</body>
</html>
